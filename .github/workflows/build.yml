name: Build Mihomo Multi-Arch

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: mihomo-linux-amd64
          - goos: linux
            goarch: arm64
            name: mihomo-linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: mihomo-linux-armv7
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            name: mihomo-linux-mipsle

    steps:
      - name: Checkout Mihomo source
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -o dist/${{ matrix.name }}

      - name: Package
        run: |
          cd dist
          tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
