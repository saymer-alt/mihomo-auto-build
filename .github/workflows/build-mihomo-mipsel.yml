name: Build Mihomo for MIPSel

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest Mihomo release
        id: check
        run: |
          LATEST=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r '.tag_name')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Mihomo: $LATEST"

      - name: Check if already built
        id: check-release
        run: |
          TAG_NAME="mipsel-${{ steps.check.outputs.latest }}"
          EXISTS=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}" | jq -r '.tag_name // "not_found"')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "$TAG_NAME" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Version $TAG_NAME already built, skipping"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check-release.outputs.already_built == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install dependencies
        if: steps.check-release.outputs.already_built == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: Clone and build Mihomo
        if: steps.check-release.outputs.already_built == 'false'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          git clone --depth 1 --branch "$VERSION" https://github.com/MetaCubeX/mihomo.git ./mihomo-src
          cd ./mihomo-src
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat \
          go build -ldflags "-X github.com/MetaCubeX/mihomo/constant.Version=${VERSION} -s -w" \
          -o ../mihomo-linux-mipsel-softfloat
          ls -la ../mihomo-linux-mipsel-softfloat
          file ../mihomo-linux-mipsel-softfloat

      - name: Create release assets
        if: steps.check-release.outputs.already_built == 'false'
        id: package
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          VER_CLEAN="${VERSION#v}"
          
          # Rename binary to match official naming convention
          cp ./mihomo-linux-mipsel-softfloat ./mihomo-linux-mipsel-softfloat-v${VER_CLEAN}
          
          echo "bin_name=mihomo-linux-mipsel-softfloat-v${VER_CLEAN}" >> "$GITHUB_OUTPUT"
          ls -la ./mihomo-linux-mipsel-softfloat-v${VER_CLEAN}

      - name: Create Release
        if: steps.check-release.outputs.already_built == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag_name }}
          name: "Mihomo ${{ steps.check.outputs.latest }} for MIPSel"
          body: |
            Auto-built Mihomo ${{ steps.check.outputs.latest }} for Keenetic MT7621 (MIPSel) routers.
            
            **Build flags:** `CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat`
            
            **Files:**
            - `mihomo-linux-mipsel-softfloat-vX.X.X` — raw binary (replace directly)
            
            **Install (replace binary directly):**
            ```bash
            cd /tmp
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.check-release.outputs.tag_name }}/${{ steps.package.outputs.bin_name }}
            chmod +x ${{ steps.package.outputs.bin_name }}
            ./${{ steps.package.outputs.bin_name }} -v   # test
            cp /opt/sbin/mihomo /opt/sbin/mihomo.backup
            mv ${{ steps.package.outputs.bin_name }} /opt/sbin/mihomo
            /opt/etc/init.d/S99mihomo restart
            ```
          files: |
            ${{ steps.package.outputs.bin_name }}
