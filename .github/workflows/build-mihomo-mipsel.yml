name: Build Mihomo for MIPSel

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest Mihomo release
        id: check
        run: |
          echo "=== Fetching latest Mihomo release ==="
          LATEST=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r '.tag_name')
          
          # Validate response
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "WARNING: GitHub API returned null or empty. Skipping build."
            echo "latest=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Mihomo: $LATEST"

      - name: Check if already built
        if: steps.check.outputs.latest != 'SKIP'
        id: check-release
        run: |
          echo "=== Checking if already built ==="
          TAG_NAME="mipsel-${{ steps.check.outputs.latest }}"
          EXISTS=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}" | jq -r '.tag_name // "not_found"')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "$TAG_NAME" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Version $TAG_NAME already built, skipping"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check.outputs.latest != 'SKIP' && steps.check-release.outputs.already_built == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install dependencies
        if: steps.check.outputs.latest != 'SKIP' && steps.check-release.outputs.already_built == 'false'
        run: |
          echo "=== Installing dependencies ==="
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: Clone and build Mihomo
        if: steps.check.outputs.latest != 'SKIP' && steps.check-release.outputs.already_built == 'false'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          echo "=== Cloning Mihomo $VERSION ==="
          git clone --depth 1 --branch "$VERSION" https://github.com/MetaCubeX/mihomo.git ./mihomo-src
          cd ./mihomo-src
          
          echo "=== Building optimized binary for MIPSel (MT7621) ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat \
          go build \
          -trimpath \
          -ldflags "-s -w -buildid= \
          -X 'github.com/metacubex/mihomo/constant.Version=${VERSION}' \
          -X 'github.com/metacubex/mihomo/constant.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
          -o ../mihomo-linux-mipsel-softfloat
          
          echo "=== Build completed ==="
          ls -la ../mihomo-linux-mipsel-softfloat
          file ../mihomo-linux-mipsel-softfloat

      - name: Create release assets
        if: steps.check.outputs.latest != 'SKIP' && steps.check-release.outputs.already_built == 'false'
        id: package
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          VER_CLEAN="${VERSION#v}"
          cp ./mihomo-linux-mipsel-softfloat ./mihomo-linux-mipsel-softfloat-v${VER_CLEAN}
          echo "bin_name=mihomo-linux-mipsel-softfloat-v${VER_CLEAN}" >> "$GITHUB_OUTPUT"
          ls -la ./mihomo-linux-mipsel-softfloat-v${VER_CLEAN}

      - name: Create Release
        if: steps.check.outputs.latest != 'SKIP' && steps.check-release.outputs.already_built == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag_name }}
          name: "Mihomo ${{ steps.check.outputs.latest }} for MIPSel"
          body: |
            Auto-built Mihomo ${{ steps.check.outputs.latest }} for Keenetic MT7621 (MIPSel) routers.
            
            **Build flags:** `CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat -trimpath -s -w -buildid=`
            
            **Install (replace binary directly):**
            ```bash
            cd /tmp
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.check-release.outputs.tag_name }}/${{ steps.package.outputs.bin_name }}
            chmod +x ${{ steps.package.outputs.bin_name }}
            ./${{ steps.package.outputs.bin_name }} -v
            rm -f /opt/sbin/mihomo
            cp ${{ steps.package.outputs.bin_name }} /opt/sbin/mihomo
            /opt/etc/init.d/S99mihomo restart
            ```
            
            **For 120+ proxies (low RAM optimization):**
            Add to `config.yaml`:
            ```yaml
            profile:
              store-selected: false
              store-fake-ip: false
            unified-delay: true
            tcp-concurrent: false
            find-process-mode: 'off'
            external-controller: 127.0.0.1:9090
            ```
          files: |
            ${{ steps.package.outputs.bin_name }}
