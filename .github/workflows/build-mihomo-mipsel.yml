name: Build Mihomo for MIPSel

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest Mihomo release
        id: check
        run: |
          echo "=== Fetching latest Mihomo release ==="
          LATEST=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r '.tag_name')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Mihomo: $LATEST"

      - name: Check if already built
        id: check-release
        run: |
          echo "=== Checking if already built ==="
          TAG_NAME="mipsel-${{ steps.check.outputs.latest }}"
          EXISTS=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_NAME}" | jq -r '.tag_name // "not_found"')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "$TAG_NAME" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Version $TAG_NAME already built, skipping"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check-release.outputs.already_built == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install dependencies
        if: steps.check-release.outputs.already_built == 'false'
        run: |
          echo "=== Installing dependencies ==="
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu binutils
          which ar
          ar --version | head -1

      - name: Clone and build Mihomo
        if: steps.check-release.outputs.already_built == 'false'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          echo "=== Cloning Mihomo $VERSION ==="
          git clone --depth 1 --branch "$VERSION" https://github.com/MetaCubeX/mihomo.git ./mihomo-src
          cd ./mihomo-src
          
          echo "=== Building for MIPSel ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat \
          go build -v -ldflags "-X github.com/MetaCubeX/mihomo/constant.Version=${VERSION} -s -w" \
          -o ../mihomo-linux-mipsel-softfloat
          
          echo "=== Build completed ==="
          ls -la ../mihomo-linux-mipsel-softfloat
          file ../mihomo-linux-mipsel-softfloat

      - name: Create ipk package
        if: steps.check-release.outputs.already_built == 'false'
        id: package
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          VER_CLEAN="${VERSION#v}"
          echo "=== Creating ipk for version $VER_CLEAN ==="
          
          mkdir -p ./ipk/CONTROL
          cat > ./ipk/CONTROL/control << 'EOF'
          Package: mihomo
          Version: ${VER_CLEAN}
          Architecture: mipsel-3.4
          Maintainer: saymer-alt
          Description: Mihomo proxy for Keenetic MT7621
          EOF
          
          mkdir -p ./ipk/opt/sbin
          cp ./mihomo-linux-mipsel-softfloat ./ipk/opt/sbin/mihomo
          chmod +x ./ipk/opt/sbin/mihomo
          
          mkdir -p ./ipk-build
          echo "=== Creating tar archives ==="
          
          # control.tar.gz must contain ONLY 'control' file at root
          # NOT '.' or './control' — opkg is strict about this
          tar czf ./ipk-build/control.tar.gz -C ./ipk/CONTROL control
          
          # data.tar.gz must contain paths from root: opt/sbin/mihomo
          tar czf ./ipk-build/data.tar.gz -C ./ipk opt
          
          echo "2.0" > ./ipk-build/debian-binary
          
          IPK_NAME="mihomo_${VER_CLEAN}_mipsel-3.4.ipk"
          echo "=== Creating ipk with ar ==="
          
          # Order MUST be: debian-binary, control.tar.gz, data.tar.gz
          # 's' flag creates symbol table required by opkg
          rm -f "./${IPK_NAME}"
          ar rcs "./${IPK_NAME}" ./ipk-build/debian-binary ./ipk-build/control.tar.gz ./ipk-build/data.tar.gz
          
          echo "=== Verifying ipk structure ==="
          ar t "./${IPK_NAME}"
          
          echo "=== Verifying control.tar.gz contents ==="
          tar tzf ./ipk-build/control.tar.gz
          
          echo "=== Verifying data.tar.gz contents ==="
          tar tzf ./ipk-build/data.tar.gz
          
          ls -la "./${IPK_NAME}"
          echo "ipk_name=$IPK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check-release.outputs.already_built == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag_name }}
          name: "Mihomo ${{ steps.check.outputs.latest }} for MIPSel"
          body: |
            Auto-built Mihomo ${{ steps.check.outputs.latest }} for Keenetic MT7621 routers.
            
            **Build flags:** `CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat`
            
            Install via opkg:
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.check-release.outputs.tag_name }}/${{ steps.package.outputs.ipk_name }}
            opkg install ${{ steps.package.outputs.ipk_name }}
            ```
          files: |
            ${{ steps.package.outputs.ipk_name }}
